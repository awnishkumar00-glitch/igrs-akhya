name: Build IGRS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk IGRS_Jaanch_Sahayak.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IGRS-Jaanch-Sahayak-APK
          path: IGRS_Jaanch_Sahayak.apk
          retention-days: 30
